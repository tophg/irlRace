<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="IRL Race — Indoor Racing League. Race your actual neighborhood in 3D. Browser-based street racing." />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>IRL Race</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preload" href="/models/blue_camry.glb" as="fetch" crossorigin>
  <link rel="preload" href="/loading-bg.jpg" as="image">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" as="style">
  <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
  <div id="game-container"></div>
  <div id="ui-overlay"></div>
  <script type="module" src="/src/main.ts"></script>

  <!-- Portrait orientation lock overlay (CSS + JS-guarded visibility) -->
  <div id="portrait-lock-overlay">
    <div class="rotate-icon"></div>
    <div class="rotate-title">Rotate Your Device</div>
    <div class="rotate-subtitle">IRL Race is best experienced in landscape mode</div>
  </div>
  <script>
    // Remove portrait-lock overlay entirely on desktop (maxTouchPoints=0 = no touch screen)
    if (navigator.maxTouchPoints === 0) {
      document.getElementById('portrait-lock-overlay')?.remove();
    }
  </script>
</body>
</html>
